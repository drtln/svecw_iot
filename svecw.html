<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVECW IoT Dashboard</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#004e92,#000428);
            color:white;
        }

        .container{
            text-align:center;
            background:rgba(255,255,255,0.12);
            padding:50px;
            border-radius:20px;
            backdrop-filter:blur(10px);
            box-shadow:0 10px 25px rgba(0,0,0,0.4);
            width:90%;
            max-width:700px;
        }

        h1{
            font-size:50px;
            margin-bottom:10px;
        }

        h2{
            color:#ffd54f;
            margin-bottom:20px;
        }

        p{
            font-size:20px;
            margin-bottom:30px;
            line-height:1.6;
        }

        .btn{
            text-decoration:none;
            background:#ff9800;
            color:white;
            padding:15px 35px;
            border-radius:30px;
            font-size:20px;
            transition:.3s;
        }

        .btn:hover{
            background:#e65100;
            transform:scale(1.05);
        }

        footer{
            margin-top:40px;
            font-size:16px;
            color:#ddd;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Welcome</h1>

    <h2>Shri Vishnu Engineering College for Women</h2>

    <p>
        Bhimavaram, Andhra Pradesh
        <br><br>
        IoT Monitoring and Smart Sensor Dashboard
    </p>

    <a href="dashboard.html" class="btn">Enter Dashboard</a>

    <footer>
        Department of Electronics & Communication Engineering<br>
        SVECW • Bhimavaram
    </footer>

</div>

</body>
</html>
