<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IoT Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f6f9;
}

header{
    background:#0d47a1;
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    width:90%;
    margin:30px auto;
}

.cards{
    display:flex;
    justify-content:space-between;
    gap:20px;
    margin-bottom:30px;
    flex-wrap:wrap;
}

.card{
    flex:1;
    min-width:250px;
    background:white;
    padding:20px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 2px 8px rgba(0,0,0,0.2);
}

.card h2{
    color:#555;
}

.value{
    font-size:40px;
    margin-top:10px;
    color:#0d47a1;
    font-weight:bold;
}

.chart-container{
    background:white;
    padding:20px;
    border-radius:10px;
    margin-bottom:30px;
    box-shadow:0 2px 8px rgba(0,0,0,0.2);
}

canvas{
    max-height:350px;
}
</style>

</head>
<body>

<header>
    <h1>IoT Monitoring Dashboard</h1>
    <h3>SVECW - Bhimavaram</h3>
</header>

<div class="container">

<div class="cards">

<div class="card">
<h2>🌡 Temperature</h2>
<div class="value" id="tempValue">30°C</div>
</div>

<div class="card">
<h2>💧 Humidity</h2>
<div class="value" id="humValue">65%</div>
</div>

</div>

<div class="chart-container">
<h2>Temperature Trend</h2>
<canvas id="tempChart"></canvas>
</div>

<div class="chart-container">
<h2>Humidity Trend</h2>
<canvas id="humChart"></canvas>
</div>

</div>

<script>

// Sample Data
let labels=["1","2","3","4","5","6","7"];

let tempData=[28,29,30,31,30,29,32];
let humData=[60,61,63,65,64,66,67];

// Temperature Chart
const tempChart=new Chart(document.getElementById('tempChart'),{

type:'line',

data:{
labels:labels,
datasets:[{
label:'Temperature (°C)',
data:tempData,
borderColor:'red',
backgroundColor:'rgba(255,0,0,0.2)',
fill:true,
tension:0.4
}]
},

options:{
responsive:true
}

});

// Humidity Chart
const humChart=new Chart(document.getElementById('humChart'),{

type:'line',

data:{
labels:labels,
datasets:[{
label:'Humidity (%)',
data:humData,
borderColor:'blue',
backgroundColor:'rgba(0,0,255,0.2)',
fill:true,
tension:0.4
}]
},

options:{
responsive:true
}

});

// Example Live Update Every 3 Seconds
setInterval(function(){

let temp=Math.floor(Math.random()*8)+28;
let hum=Math.floor(Math.random()*15)+55;

document.getElementById("tempValue").innerHTML=temp+"°C";
document.getElementById("humValue").innerHTML=hum+"%";

labels.push(labels.length+1);

tempData.push(temp);
humData.push(hum);

if(labels.length>15){
labels.shift();
tempData.shift();
humData.shift();
}

tempChart.update();
humChart.update();

},3000);

</script>

</body>
</html>
